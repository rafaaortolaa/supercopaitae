<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITAE Sports | Supercopa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --dark-bg: #03040a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: radial-gradient(circle at 50% -20%, #172a4f 0%, #03040a 80%);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .font-sport { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .text-gold { color: var(--gold); }
        .active-tab-filter {
            background: var(--gold);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .bottom-nav {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 -5px 30px rgba(0,0,0,0.8);
        }

        .nav-item { color: #888; transition: color 0.3s ease; }
        .nav-item.active { color: var(--gold); }

        .page-section { display: none; animation: slideUp 0.3s ease-out; }
        .page-section.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .team-card { transition: all 0.3s ease; }
        .team-card.open { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .player-drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .team-card.open .player-drawer { max-height: 600px; padding-top: 1.5rem; }

        /* Estilo para la lista vertical de jugadores */
        .player-item {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-item:last-child { border-bottom: none; }
        .captain { color: var(--gold); font-weight: 700; border-left: 3px solid var(--gold); padding-left: 10px; background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body class="pb-28">

    <header class="pt-8 px-6 flex flex-col items-center gap-6 relative z-10">
        <img src="itaesports.png" alt="ITAE SPORTS" class="h-14 object-contain opacity-90 drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">
        <div class="relative group">
            <div class="absolute -inset-2 bg-gold-light rounded-full blur-2xl opacity-10 group-hover:opacity-30 transition"></div>
            <img src="supercopaitae.png" alt="Supercopa de ITAE" class="relative h-44 object-contain drop-shadow-[0_15px_30px_rgba(0,0,0,0.9)]">
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-10 relative z-10">
        
        <section id="section-partidos" class="page-section active">
            <div class="flex justify-between items-end mb-6">
                <h2 class="font-sport text-xs tracking-widest text-gold-light">Horario</h2>
                <span class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.3em]">SEASON 2026</span>
            </div>
            <div class="flex gap-2 mb-6 overflow-x-auto pb-3 no-scrollbar border-b border-white/5">
                <button onclick="renderMatches('jornadas', this)" class="active-tab-filter glass px-5 py-2 rounded-full text-[10px] uppercase font-bold tracking-wider whitespace-nowrap">Jornadas</button>
                <button onclick="renderMatches('semis', this)" class="glass text-gray-400 px-5 py-2 rounded-full text-[10px] uppercase font-bold tracking-wider whitespace-nowrap">Semifinales</button>
                <button onclick="renderMatches('final', this)" class="glass text-gray-400 px-5 py-2 rounded-full text-[10px] uppercase font-bold tracking-wider whitespace-nowrap">Finales</button>
            </div>
            <div id="match-list" class="space-y-5"></div>
        </section>

        <section id="section-equipos" class="page-section">
            <div class="flex justify-between items-end mb-6">
                <h2 class="font-sport text-xs tracking-widest text-gold-light">Plantillas Oficiales</h2>
                <span class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.3em]">Season 2026</span>
            </div>
            
            <div class="space-y-4">
                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="lasgacelas.png" alt="Las Gacelas" class="w-12 h-12 object-contain drop-shadow-md">
                            <h3 class="font-sport text-xs tracking-wider">Las Gacelas</h3>
                        </div>
                        <i class="fas fa-chevron-down text-gold text-xs transition-transform"></i>
                    </div>
                    <div class="player-drawer">
                        <div class="glass rounded-xl overflow-hidden">
                            <div class="player-item captain"><span>Pepe</span><span class="text-[10px] font-sport">CAPITÁN</span></div>
                            <div class="player-item"><span>Isaac</span></div>
                            <div class="player-item"><span>Valentino</span></div>
                            <div class="player-item"><span>Hiram</span></div>
                            <div class="player-item"><span>Gacela</span></div>
                        </div>
                    </div>
                </div>

                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="brocajuniors.png" alt="Broca Juniors" class="w-12 h-12 object-contain drop-shadow-md">
                            <h3 class="font-sport text-xs tracking-wider">Broca Juniors</h3>
                        </div>
                        <i class="fas fa-chevron-down text-gold text-xs transition-transform"></i>
                    </div>
                    <div class="player-drawer">
                        <div class="glass rounded-xl overflow-hidden">
                            <div class="player-item captain"><span>Jorge</span><span class="text-[10px] font-sport">CAPITÁN</span></div>
                            <div class="player-item"><span>Rafa</span></div>
                            <div class="player-item"><span>Israel</span></div>
                            <div class="player-item"><span>Salva</span></div>
                            <div class="player-item"><span>William</span></div>
                        </div>
                    </div>
                </div>

                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="astonpila.png" alt="Aston Pila" class="w-12 h-12 object-contain drop-shadow-md">
                            <h3 class="font-sport text-xs tracking-wider">Aston Pila</h3>
                        </div>
                        <i class="fas fa-chevron-down text-gold text-xs transition-transform"></i>
                    </div>
                    <div class="player-drawer">
                        <div class="glass rounded-xl overflow-hidden">
                            <div class="player-item captain"><span>Santi</span><span class="text-[10px] font-sport">CAPITÁN</span></div>
                            <div class="player-item"><span>Iván</span></div>
                            <div class="player-item"><span>Serhi</span></div>
                            <div class="player-item"><span>Moad</span></div>
                            <div class="player-item"><span>Jesús</span></div>
                        </div>
                    </div>
                </div>

                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="pickandplace.png" alt="Pick and Place" class="w-12 h-12 object-contain drop-shadow-md">
                            <h3 class="font-sport text-xs tracking-wider">Pick and Place</h3>
                        </div>
                        <i class="fas fa-chevron-down text-gold text-xs transition-transform"></i>
                    </div>
                    <div class="player-drawer">
                        <div class="glass rounded-xl overflow-hidden">
                            <div class="player-item captain"><span>María</span><span class="text-[10px] font-sport">CAPITÁN</span></div>
                            <div class="player-item"><span>Pablo</span></div>
                            <div class="player-item"><span>Christopher</span></div>
                            <div class="player-item"><span>Ester</span></div>
                            <div class="player-item"><span>Juan</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-18 glass rounded-full flex justify-around items-center px-8 z-50 border border-gold/10">
        <button onclick="showPage('partidos', this)" id="nav-partidos" class="nav-item active flex flex-col items-center gap-1.5 transition-all">
            <i class="fas fa-trophy text-xl"></i>
            <span class="text-[9px] uppercase mt-1 font-bold font-sport tracking-wider">Torneo</span>
        </button>
        <button onclick="showPage('equipos', this)" id="nav-equipos" class="nav-item flex flex-col items-center gap-1.5 transition-all">
            <i class="fas fa-users-cog text-xl"></i>
            <span class="text-[9px] uppercase mt-1 font-bold font-sport tracking-wider">Equipos</span>
        </button>
    </nav>

    <script>
        const matches = {
            jornadas: [
                { id: 1, label: 'Jornada 1', t1: 'Las Gacelas', f1: 'lasgacelas.png', t2: 'Broca Juniors', f2: 'brocajuniors.png', time: '' },
                { id: 2, label: 'Jornada 2', t1: 'Aston Pila', f1: 'astonpila.png', t2: 'Pick & Place', f2: 'pickandplace.png', time: '' },
                { id: 3, label: 'Jornada 3', t1: 'Las Gacelas', f1: 'lasgacelas.png', t2: 'Aston Pila', f2: 'astonpila.png', time: '' },
                { id: 4, label: 'Jornada 4', t1: 'Broca Juniors', f1: 'brocajuniors.png', t2: 'Pick & Place', f2: 'pickandplace.png', time: '' },
                { id: 5, label: 'Jornada 5', t1: 'Pick & Place', f1: 'pickandplace.png', t2: 'Las Gacelas', f2: 'lasgacelas.png', time: '' },
                { id: 6, label: 'Jornada 6', t1: 'Broca Juniors', f1: 'brocajuniors.png', t2: 'Aston Pila', f2: 'astonpila.png', time: '' }
            ],
            semis: [
                { id: 7, label: 'Semifinal 1', t1: '1º Clasificado', f1: 'supercopaitae.png', t2: '4º Clasificado', f2: 'supercopaitae.png', time: '' },
                { id: 8, label: 'Semifinal 2', t1: '2º Clasificado', f1: 'supercopaitae.png', t2: '3º Clasificado', f2: 'supercopaitae.png', time: '' }
            ],
            final: [
                { id: 9, label: '3º y 4º', t1: 'Perdedor S1', f1: 'supercopaitae.png', t2: 'Perdedor S2', f2: 'supercopaitae.png', time: '' },
                { id: 10, label: 'Final', t1: 'Ganador S1', f1: 'supercopaitae.png', t2: 'Ganador S2', f2: 'supercopaitae.png', time: '', isFinal: true }
            ]
        };

        function renderMatches(group, btn) {
            const container = document.getElementById('match-list');
            container.innerHTML = matches[group].map(m => `
                <div class="glass p-5 rounded-3xl relative overflow-hidden ${m.isFinal ? 'border border-gold shadow-[0_0_20px_rgba(212,175,55,0.3)]' : ''}">
                    ${m.isFinal ? '<div class="absolute top-0 right-0 bg-gold text-black px-4 py-1.5 text-[8px] uppercase font-bold font-sport tracking-widest rounded-bl-xl shadow-lg"></div>' : ''}
                    <div class="flex justify-between items-center gap-1">
                        <div class="flex-1 flex flex-col items-center gap-2">
                            <img src="${m.f1}" alt="${m.t1}" class="w-12 h-12 object-contain drop-shadow-md">
                            <p class="font-bold text-sm tracking-tighter uppercase text-center">${m.t1}</p>
                        </div>
                        <div class="flex flex-col items-center px-4 w-28">
                            <span class="text-[9px] text-gold font-bold mb-2 tracking-widest font-sport">${m.label}</span>
                            <div class="bg-white/10 text-gold-light px-5 py-2 rounded-lg font-black italic tracking-widest shadow-xl border border-white/5 text-xs">VS</div>
                            <span class="text-[10px] mt-2 font-bold opacity-70">${m.time} </span>
                        </div>
                        <div class="flex-1 flex flex-col items-center gap-2">
                            <img src="${m.f2}" alt="${m.t2}" class="w-12 h-12 object-contain drop-shadow-md">
                            <p class="font-bold text-sm tracking-tighter uppercase text-center">${m.t2}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('#section-partidos button').forEach(b => {
                b.className = 'glass text-gray-400 px-5 py-2 rounded-full text-[10px] uppercase font-bold tracking-wider whitespace-nowrap';
            });
            btn.className = 'active-tab-filter glass px-5 py-2 rounded-full text-[10px] uppercase font-bold tracking-wider whitespace-nowrap';
        }

        function showPage(pageName, btn) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + pageName).classList.add('active');
            document.querySelectorAll('nav .nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        renderMatches('jornadas', document.querySelector('#section-partidos button'));
    </script>
</body>
</html>
