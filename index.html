<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITAE Sports | Supercopa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #03040a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: radial-gradient(circle at 50% -20%, #172a4f 0%, #03040a 80%);
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        .font-sport { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .active-tab-filter {
            background: var(--gold);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .bottom-nav {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .page-section { display: none; animation: slideUp 0.3s ease-out; }
        .page-section.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .team-card.open .player-drawer { max-height: 500px; padding-top: 1.5rem; }
        .player-drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
    </style>
</head>
<body class="pb-32">

    <header class="pt-8 px-6 flex flex-col items-center gap-6">
        <img src="itaesports.png" alt="ITAE SPORTS" class="h-14 object-contain">
        
        <img src="supercopaitae.png" alt="Supercopa" class="h-44 object-contain drop-shadow-2xl">
    </header>

    <main class="max-w-md mx-auto px-4 mt-10">
        
        <section id="section-partidos" class="page-section active">
            <div class="flex justify-between items-end mb-6">
                <h2 class="font-sport text-[10px] tracking-widest text-gold">Calendario</h2>
            </div>

            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="renderMatches('jornadas', this)" class="active-tab-filter glass px-4 py-2 rounded-full text-[9px] uppercase font-bold whitespace-nowrap">Jornadas</button>
                <button onclick="renderMatches('semis', this)" class="glass text-gray-400 px-4 py-2 rounded-full text-[9px] uppercase font-bold whitespace-nowrap">Semifinales</button>
                <button onclick="renderMatches('final', this)" class="glass text-gray-400 px-4 py-2 rounded-full text-[9px] uppercase font-bold whitespace-nowrap">Finales</button>
            </div>

            <div id="match-list" class="space-y-4">
                </div>
        </section>

        <section id="section-equipos" class="page-section">
            <h2 class="font-sport text-[10px] tracking-widest text-gold mb-6">Plantillas</h2>
            
            <div class="space-y-4">
                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center text-xs">
                        <div class="flex items-center gap-4">
                            <img src="lasgacelas.png" class="w-10 h-10 object-contain">
                            <span class="font-sport">Las Gacelas</span>
                        </div>
                        <i class="fas fa-chevron-down text-gold"></i>
                    </div>
                    <div class="player-drawer text-sm text-gray-300 italic">
                        Isaac, Valentino, Hiram, Gacela, Pepe (C)
                    </div>
                </div>

                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center text-xs">
                        <div class="flex items-center gap-4">
                            <img src="brocajuniors.png" class="w-10 h-10 object-contain">
                            <span class="font-sport">Broca Juniors</span>
                        </div>
                        <i class="fas fa-chevron-down text-gold"></i>
                    </div>
                    <div class="player-drawer text-sm text-gray-300 italic">
                        Rafa, Israel, Salva, William, Jorge
                    </div>
                </div>

                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center text-xs">
                        <div class="flex items-center gap-4">
                            <img src="astonpila.png" class="w-10 h-10 object-contain">
                            <span class="font-sport">Aston Pila</span>
                        </div>
                        <i class="fas fa-chevron-down text-gold"></i>
                    </div>
                    <div class="player-drawer text-sm text-gray-300 italic">
                        Santi, Iván, Serhi, Moad, Jesús
                    </div>
                </div>

                <div class="team-card glass rounded-2xl p-5" onclick="this.classList.toggle('open')">
                    <div class="flex justify-between items-center text-xs">
                        <div class="flex items-center gap-4">
                            <img src="pickandplace.png" class="w-10 h-10 object-contain">
                            <span class="font-sport">Pick and Place</span>
                        </div>
                        <i class="fas fa-chevron-down text-gold"></i>
                    </div>
                    <div class="player-drawer text-sm text-gray-300 italic">
                        Pablo, María, Christopher, Juan, Ester
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center z-50">
        <button onclick="showPage('partidos', this)" class="flex flex-col items-center gap-1 text-gold">
            <i class="fas fa-futbol text-xl"></i>
            <span class="text-[8px] font-sport">Partidos</span>
        </button>
        <button onclick="showPage('equipos', this)" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-users text-xl"></i>
            <span class="text-[8px] font-sport">Equipos</span>
        </button>
    </nav>

    <script>
        const matches = {
            jornadas: [
                { l: 'J1', t1: 'Las Gacelas', f1: 'lasgacelas.png', t2: 'Broca Jrs', f2: 'brocajuniors.png', h: '18:00' },
                { l: 'J2', t1: 'Aston Pila', f1: 'astonpila.png', t2: 'Pick & Place', f2: 'pickandplace.png', h: '18:15' },
                { l: 'J3', t1: 'Las Gacelas', f1: 'lasgacelas.png', t2: 'Aston Pila', f2: 'astonpila.png', h: '18:30' },
                { l: 'J4', t1: 'Broca Jrs', f1: 'brocajuniors.png', t2: 'Pick & Place', f2: 'pickandplace.png', h: '18:45' },
                { l: 'J5', t1: 'Pick & Place', f1: 'pickandplace.png', t2: 'Las Gacelas', f2: 'lasgacelas.png', h: '19:00' },
                { l: 'J6', t1: 'Broca Jrs', f1: 'brocajuniors.png', t2: 'Aston Pila', f2: 'astonpila.png', h: '19:15' }
            ],
            semis: [
                { l: 'S1', t1: '1º Clasif', f1: 'supercopaitae.png', t2: '4º Clasif', f2: 'supercopaitae.png', h: '20:00' },
                { l: 'S2', t1: '2º Clasif', f1: 'supercopaitae.png', t2: '3º Clasif', f2: 'supercopaitae.png', h: '20:15' }
            ],
            final: [
                { l: '3º/4º', t1: 'Perdedor S1', f1: 'supercopaitae.png', t2: 'Perdedor S2', f2: 'supercopaitae.png', h: '21:00' },
                { l: 'Final', t1: 'Ganador S1', f1: 'supercopaitae.png', t2: 'Ganador S2', f2: 'supercopaitae.png', h: '21:30' }
            ]
        };

        function renderMatches(group, btn) {
            const list = document.getElementById('match-list');
            list.innerHTML = matches[group].map(m => `
                <div class="glass p-4 rounded-xl flex justify-between items-center">
                    <div class="flex-1 flex flex-col items-center gap-1">
                        <img src="${m.f1}" class="w-8 h-8 object-contain">
                        <span class="text-[10px] font-bold text-center">${m.t1}</span>
                    </div>
                    <div class="flex flex-col items-center px-2">
                        <span class="text-[8px] text-gold mb-1 font-sport">${m.l}</span>
                        <div class="bg-white/10 px-3 py-1 rounded text-[10px] font-black italic border border-white/5 text-gold">VS</div>
                        <span class="text-[8px] mt-1 opacity-50">${m.h}</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-1">
                        <img src="${m.f2}" class="w-8 h-8 object-contain">
                        <span class="text-[10px] font-bold text-center">${m.t2}</span>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('#section-partidos button').forEach(b => b.className = 'glass text-gray-400 px-4 py-2 rounded-full text-[9px] uppercase font-bold whitespace-nowrap');
            btn.className = 'active-tab-filter glass px-4 py-2 rounded-full text-[9px] uppercase font-bold whitespace-nowrap';
        }

        function showPage(p, btn) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + p).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-gold', 'text-gray-500'));
            btn.classList.replace('text-gray-500', 'text-gold');
        }

        renderMatches('jornadas', document.querySelector('#section-partidos button'));
    </script>
</body>
</html>
